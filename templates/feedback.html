
<form method="POST" action="{{ url_for('feedback') }}"style="border:red solid 3px; margin:auto; height:50vh; background-color:lightgray; margin-top:10vh;">
    {{ form.hidden_tag() }}
    <div class="form-group" style="margin-left:3vh; margin-right:3vh;">
        {{ form.subject.label }}
        {{ form.subject }}
        {% for error in form.subject.errors %}
            <span style="color: red;">{{ error }}</span>
        {% endfor %}
    </div>
    <div class="form-group" style="margin-left:3vh; margin-right:3vh;">
        {{ form.feedback.label }}
        {{ form.feedback }}
        {% for error in form.feedback.errors %}
            <span style="color: red;">{{ error }}</span>
        {% endfor %}
    </div>
    <button type="submit" class="btn btn-primary"style="justify-self:center">Submit Feedback</button>
</form>
